name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run test
      - run: pnpm run build

  core:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: contracts/crashlab-core
    steps:
      - uses: actions/checkout@v4
      - run: cargo test --all-targets

  soroban-example:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: contracts/soroban-example
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable with wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts/soroban-example
      - name: Run tests
        run: cargo test --all-targets
      - name: Build WASM artifact
        run: cargo build --target wasm32-unknown-unknown --release

  ops-scripts-syntax:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - run: bash -n scripts/backlog-freshness-review.sh
      - run: bash -n scripts/contracts/build-soroban-example.sh

  e2e:
    needs: [web]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm dlx playwright install --with-deps chromium
      - run: pnpm dlx playwright test

  regression:
    needs: [core, web, soroban-example]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: contracts/crashlab-core
    steps:
      - uses: actions/checkout@v4
      - run: cargo run --bin crashlab -- regression-suite fixtures/
