services:
  web:
    build:
      context: ./apps/web
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    command: npm run dev

  web-prod:
    build:
      context: ./apps/web
      target: runner
    ports:
      - "3001:3000"
    profiles:
      - prod

  core:
    build:
      context: ./contracts/crashlab-core
    profiles:
      - core

volumes:
  web_node_modules:
